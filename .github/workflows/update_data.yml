name: Update MTEB DE data

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch MTEB data
        run: python scripts/fetch_mteb_de.py

      - name: Validate JSON
        run: python scripts/validate_json.py

      - name: Copy data to Astro lib
        run: node scripts/copy_data.mjs

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ src/lib/data/
          if git diff --staged --quiet; then
            echo "[INFO] No data changes"
          else
            git commit -m "chore(data): refresh MTEB DE leaderboard"
            git push
          fi
