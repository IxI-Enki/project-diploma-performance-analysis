name: Deploy MTEB DE dashboard

on:
  push:
    branches: [master, 004-mteb-de-dashboard]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Fetch and validate data
        run: |
          pip install -r scripts/requirements.txt
          set +e
          python scripts/fetch_mteb_de.py
          FETCH_RC=$?
          set -e
          if [ "$FETCH_RC" -ne 0 ]; then
            echo "::warning::MTEB live fetch failed (exit $FETCH_RC); deploying committed snapshot"
          fi
          if [ ! -f data/mteb_de_leaderboard.json ]; then
            echo "::error::Missing data/mteb_de_leaderboard.json after fetch"
            exit 1
          fi
          python scripts/validate_json.py

      - name: Copy JSON to Astro lib
        run: node scripts/copy_data.mjs

      - uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: npm

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
